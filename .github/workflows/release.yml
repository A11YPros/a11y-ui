name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      CHANGESETS_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate changesets target design-system only
        run: npm run changeset:validate

      - name: Create release PR or publish (PAT)
        if: ${{ env.CHANGESETS_TOKEN != '' }}
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          title: Version Packages
          commit: Version Packages
        env:
          GITHUB_TOKEN: ${{ env.CHANGESETS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish without release PR
        if: ${{ env.CHANGESETS_TOKEN == '' }}
        run: |
          pending_changesets=$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')

          if [ "$pending_changesets" -gt 0 ]; then
            echo "::error::Pending changesets found, but release PR creation is disabled for GITHUB_TOKEN and CHANGESETS_TOKEN is not set."
            echo "::error::Set repository secret CHANGESETS_TOKEN (PAT with repo write access), or run versioning locally and commit versioned files before push."
            exit 1
          fi

          npm run release
        env:
          NPM_CONFIG_PROVENANCE: true
